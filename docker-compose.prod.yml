name: bora-pro-play

x-laravel-service: &laravel-service
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment: &laravel-environment
    APP_NAME: ${APP_NAME:-Bora Pro Play}
    APP_ENV: ${APP_ENV:-production}
    APP_KEY: ${APP_KEY:?APP_KEY is required}
    APP_DEBUG: ${APP_DEBUG:-false}
    APP_URL: ${APP_URL:?APP_URL is required}
    APP_LOCALE: ${APP_LOCALE:-pt_BR}
    APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-pt_BR}
    APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-pt_BR}
    APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
    APP_PREVIOUS_KEYS: ${APP_PREVIOUS_KEYS:-}
    LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
    LOG_LEVEL: ${LOG_LEVEL:-info}
    LARAVEL_OPTIMIZE: ${LARAVEL_OPTIMIZE:-true}
    DB_CONNECTION: ${DB_CONNECTION:-sqlite}
    DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
    DB_HOST: ${DB_HOST:-}
    DB_PORT: ${DB_PORT:-}
    DB_USERNAME: ${DB_USERNAME:-}
    DB_PASSWORD: ${DB_PASSWORD:-}
    DB_URL: ${DB_URL:-}
    CACHE_STORE: ${CACHE_STORE:-database}
    SESSION_DRIVER: ${SESSION_DRIVER:-database}
    SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
    SESSION_PATH: ${SESSION_PATH:-/}
    SESSION_DOMAIN: ${SESSION_DOMAIN:-}
    SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
    SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
    FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
    QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
    MAIL_MAILER: ${MAIL_MAILER:-log}
    MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Bora Pro Play}
    MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@example.com}
  volumes:
    - laravel_storage:/var/www/html/storage
    - laravel_database:/var/www/html/database

services:
  app:
    <<: *laravel-service
    command: ["app"]
    environment:
      <<: *laravel-environment
      RUN_MIGRATIONS: "true"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  queue:
    <<: *laravel-service
    profiles: ["workers"]
    command: ["queue"]
    environment:
      <<: *laravel-environment
      RUN_MIGRATIONS: "false"
    depends_on:
      app:
        condition: service_healthy
    stop_grace_period: 2m

  scheduler:
    <<: *laravel-service
    profiles: ["scheduler"]
    command: ["scheduler"]
    environment:
      <<: *laravel-environment
      RUN_MIGRATIONS: "false"
    depends_on:
      app:
        condition: service_healthy

volumes:
  laravel_storage:
  laravel_database:
